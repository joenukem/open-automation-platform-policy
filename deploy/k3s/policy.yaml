apiVersion: v1
kind: Namespace
metadata:
  name: open-automation-platform
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: policy
  namespace: open-automation-platform
  labels:
    app.kubernetes.io/name: policy
    app.kubernetes.io/part-of: open-automation-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: policy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: policy
        app.kubernetes.io/part-of: open-automation-platform
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: policy
          # Community/source-built image. For franken in-VM pulls, mirror to
          # franken-registry.example.com:5000/open-automation-platform/policy.
          image: ghcr.io/joenukem/open-automation-platform-policy:latest
          imagePullPolicy: IfNotPresent
          args: ["-addr=:8181", "-policies=/policies"]
          ports:
            - name: http
              containerPort: 8181
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: policy
  namespace: open-automation-platform
  labels:
    app.kubernetes.io/name: policy
    app.kubernetes.io/part-of: open-automation-platform
spec:
  selector:
    app.kubernetes.io/name: policy
  ports:
    - name: http
      port: 8181
      targetPort: http
